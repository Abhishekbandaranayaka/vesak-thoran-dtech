      * {
        margin: 0px;
        padding: 0px;

      :root {
        /* Thoran stage design size (matches bg.png layout at 1×) */
        --ui-design-w: 1040;
        --ui-design-h: 700;
        --ui-scale-fit: min(
          (100vw - 20px) / var(--ui-design-w),
          (100vh - 20px) / var(--ui-design-h)
        );
        /* Standard laptop (typical 1366–1920px width) */
        --ui-scale: min(0.88, var(--ui-scale-fit));
        --story-panel-width: min(480px, 42vw);
        --story-text-size: clamp(13px, 1.25vw, 20px);
        --story-btn-size: clamp(11px, 0.95vw, 14px);
      }

      /* Wide laptop / small desktop */
      @media only screen and (min-width: 1600px) and (max-width: 1919px) {
        :root {
          --ui-scale: min(1, var(--ui-scale-fit));
          --story-panel-width: min(520px, 40vw);
          --story-text-size: clamp(14px, 1.2vw, 22px);
          --story-btn-size: clamp(12px, 0.9vw, 15px);
        }
      }

      /* Large desktop / wide monitors */
      @media only screen and (min-width: 1920px) {
        :root {
          --ui-scale: min(1.18, var(--ui-scale-fit));
          --story-panel-width: min(660px, 38vw);
          --story-text-size: clamp(17px, 1.15vw, 28px);
          --story-btn-size: clamp(14px, 0.9vw, 19px);
        }
      }

      /* Very large / 4K displays */
      @media only screen and (min-width: 2560px) {
        :root {
          --ui-scale: min(1.32, var(--ui-scale-fit));
          --story-panel-width: min(760px, 34vw);
          --story-text-size: clamp(19px, 1.05vw, 32px);
          --story-btn-size: clamp(15px, 0.8vw, 22px);
        }
      }

      @media only screen and (max-width: 1366px) {
        :root {
          --story-panel-width: min(400px, 48vw);
          --story-text-size: clamp(12px, 1.4vw, 17px);
          --story-btn-size: clamp(10px, 1.1vw, 13px);
        }
      }

      .curtain {
        margin: 0;
        width: 100%;
        overflow: hidden;
      }
      .curtain-wrapper {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      .curtain-panel {
        display: flex;
        align-items: center;
        background: #f4f2f1;
        color: #fff;
        float: left;
        position: relative;
        width: 50%;
        height: 100vh;
        transition: all 4s ease-out;
        z-index: 2;
        margin: 0;
      }
      .curtain-left {
        justify-content: flex-end;
        transform: translateX(0);
      }
      .curtain-right {
        justify-content: flex-start;
        transform: translateX(0);
      }

      .curtain-left.open {
        transform: translateX(-100%);
      }

      .curtain-right.open {
        transform: translateX(100%);
      }

      .curtain-panel img {
        max-width: 72%;
        max-height: 82vh;

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }


    async function middle_led_animation_1() {
      for (var i = 0; i < 6; i++) {
        await sleep(150);
        $(".circle-0-" + (i + 1) + " .led").addClass("on");
      }
      await sleep(200);
      $(".middle-circle .led").removeClass("on");

      middle_led_animation_1();
    }

    async function middle_led_animation_2() {
      var colors = ["red", "green", "yellow", "blue"];
      var j = 0;

      for (var i = 0; i < 20; i++) {

        await sleep(100);
        $(".middle-circle .led-" + i).addClass("on");

        j++;

        if (j == 4) {
          j = 0;
        }
      }

      await sleep(250);
      $(".middle-circle .led").removeClass("on");
      middle_led_animation_2()
    }


    async function outer_led_animation() {
      var colors = ["red", "green", "yellow", "blue"];
      var j = 0;

      for (var i = 0; i < 20; i++) {

        await sleep(100);
        $(".outer-circle .led-" + i).addClass("on led-" + colors[j]);

        j++;

        if (j == 4) {
          j = 0;
        }
      }

      await sleep(250);
      $(".outer-circle .led").removeClass("led-green led-red led-yellow led-blue");
      outer_led_animation();
    }
